name: CI

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve base path
        run: |
          BASE_PATH="${PAGES_BASE_PATH:-/${GITHUB_REPOSITORY#*/}/}"
          echo "VITE_BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"

      - name: Install
        run: npm ci

      - name: Validate config defaults
        run: npm run validate:configs

      - name: Audit model assets
        run: npm run validate:model-assets:strict

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Validate dist artifact
        run: npm run validate:dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        env:
          PLAYWRIGHT_SERVER_MODE: preview
        run: npm run test:e2e:smoke

      - name: Modular room regression tests
        env:
          PLAYWRIGHT_SERVER_MODE: preview
        run: >
          npx playwright test --config=playwright.config.mjs tests/e2e/modular-showcase.spec.mjs
          -g "south padre room is a static lobby annex with linked gallery screens and a new-tab portal|south padre rifle stays centered, rotates in place, and links to center-artifact emissive pulse|south padre gallery panels stay hidden behind neighboring room walls and appear inside SPI|screening hall keeps overflow in a single widened room instead of cloning south|hidden screening shell walls stay collider-disabled after a catalog rebuild"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-ci
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
