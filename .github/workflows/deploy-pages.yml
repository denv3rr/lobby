name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BUILD_ID: ${{ github.sha }}
      PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve base path
        run: |
          BASE_PATH="${PAGES_BASE_PATH:-/${GITHUB_REPOSITORY#*/}/}"
          echo "VITE_BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"

      - name: Install
        run: npm ci

      - name: Refresh external content
        run: npm run sync:ci

      - name: Validate config defaults
        run: npm run validate:configs

      - name: Audit model assets
        run: npm run validate:model-assets:strict

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Validate dist artifact
        run: npm run validate:dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test built Pages artifact
        env:
          PLAYWRIGHT_SERVER_MODE: preview
        run: npm run test:e2e:smoke

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
