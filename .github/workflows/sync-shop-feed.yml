name: Sync Content Feeds

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-content-feeds
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync default feeds
        run: npm run sync:defaults

      - name: Validate config defaults
        run: npm run validate:configs

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Validate dist artifact
        run: npm run validate:dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        env:
          PLAYWRIGHT_SERVER_MODE: preview
        run: npm run test:e2e:smoke

      - name: Modular room regression tests
        env:
          PLAYWRIGHT_SERVER_MODE: preview
        run: >
          npx playwright test --config=playwright.config.mjs tests/e2e/modular-showcase.spec.mjs
          -g "south padre room is a static lobby annex with linked gallery screens and a new-tab portal|south padre rifle stays centered, rotates in place, and links to center-artifact emissive pulse|south padre gallery panels stay hidden behind neighboring room walls and appear inside SPI|screening hall keeps overflow in a single widened room instead of cloning south|hidden screening shell walls stay collider-disabled after a catalog rebuild"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-sync-content-feeds
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- public/config.defaults/shop-feed.json public/config.defaults/projects-feed.json public/config.defaults/videos-feed.json public/config.defaults/videos-long-feed.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/config.defaults/shop-feed.json public/config.defaults/projects-feed.json public/config.defaults/videos-feed.json public/config.defaults/videos-long-feed.json
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "chore: sync external content feeds"
          git push
